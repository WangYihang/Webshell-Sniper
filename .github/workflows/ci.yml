name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

env:
  PYTHON_VERSION: "3.14"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP (target for integration tests)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install uv
        # setup-uv has no floating `v8` major tag yet; pin the exact latest release.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type check (mypy)
        run: uv run mypy

      - name: Test (pytest + coverage gate)
        run: uv run pytest -q --cov=webshell_sniper --cov-report=term-missing --cov-fail-under=70
